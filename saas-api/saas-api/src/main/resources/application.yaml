spring:
  application:
    name: saas-api

  datasource:
    # Usamos la sintaxis ${VARIABLE:VALOR_POR_DEFECTO}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventario_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driverClassName: org.postgresql.Driver

  jpa:
    # Eliminamos database-platform manual; Hibernate lo detecta automáticamente
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
